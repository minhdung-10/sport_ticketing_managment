{% extends "base.html" %}

{% block title %}Log In - SportsTix{% endblock %}

{% block content %}
<main class="flex items-center justify-center min-h-screen py-24 px-4 sm:px-6 lg:px-8 w-full relative z-10">
    <div class="max-w-[480px] w-full bg-white p-8 md:p-10 rounded-[2rem] shadow-2xl relative text-center">
        <!-- Close button -->
        <a href="{{ url_for('index') }}" class="absolute top-6 right-6 w-10 h-10 border border-gray-200 rounded-full flex items-center justify-center text-gray-500 hover:border-gray-300 hover:bg-gray-50 transition-colors">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </a>

        <!-- Logo -->
        <div class="mx-auto w-12 h-12 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center font-bold text-white text-2xl mb-6 shadow-lg shadow-primary/30">S</div>

        <h2 class="text-3xl font-bold text-gray-900 tracking-tight mb-8">Sign up or log in</h2>

        <!-- Toggle Pill -->
        <div class="flex bg-gray-100 p-1 rounded-full mb-8">
            <div class="flex-1 text-center py-3.5 bg-white rounded-full shadow-sm text-gray-900 font-bold text-sm cursor-default">Log in</div>
            <a href="{{ url_for('register') }}" class="flex-1 text-center py-3.5 text-gray-500 hover:text-gray-900 font-bold text-sm transition-colors block">Sign up</a>
        </div>

        <form action="{{ url_for('login') }}" method="POST" class="space-y-4 text-left">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="relative">
                <label for="email" class="absolute top-2.5 left-4 text-xs font-medium text-gray-500">Email</label>
                <input id="email" name="email" type="text" required class="block w-full pt-7 pb-2.5 px-4 bg-white border-2 border-gray-300 rounded-2xl text-gray-900 focus:outline-none focus:border-black focus:ring-0 transition-colors font-medium text-base" placeholder="">
            </div>

            <div class="relative">
                <label for="password" class="absolute top-2.5 left-4 text-xs font-medium text-gray-500">Password</label>
                <input id="password" name="password" type="password" required class="block w-full pt-7 pb-2.5 px-4 bg-white border-2 border-gray-300 rounded-2xl text-gray-900 focus:outline-none focus:border-black focus:ring-0 transition-colors font-medium text-base" placeholder="">
            </div>

            <div class="flex justify-end mt-2 mb-2">
                <a href="#" class="text-sm font-semibold text-gray-500 hover:text-gray-900 transition-colors">Forgot your password?</a>
            </div>

            <button type="submit" class="w-full bg-black hover:bg-gray-900 text-white font-bold py-4 rounded-2xl text-base transition-colors mt-2">
                Log in
            </button>
        </form>
    </div>
</main>
{% endblock %}
